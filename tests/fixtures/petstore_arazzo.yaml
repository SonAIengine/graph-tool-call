arazzo: 1.0.0
info:
  title: Petstore Workflows
  version: 1.0.0
sourceDescriptions:
  - name: petstore
    url: https://petstore3.swagger.io/api/v3/openapi.json
    type: openapi
workflows:
  - workflowId: adoptPet
    summary: Adopt a pet from the store
    steps:
      - stepId: findPet
        operationId: listPets
        description: Find available pets
      - stepId: getPetDetails
        operationId: getPetById
        dependsOn:
          - findPet
        description: Get details of a specific pet
      - stepId: adoptThePet
        operationId: updatePet
        dependsOn:
          - getPetDetails
        description: Update pet status to adopted
  - workflowId: managePetInventory
    summary: Manage pet inventory
    steps:
      - stepId: checkInventory
        operationId: getInventory
        description: Check current inventory
      - stepId: addNewPet
        operationId: addPet
        description: Add a new pet to the store
